<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>

<style>
body { font-family: system-ui; background:#0f172a; color:white; margin:0; }
.container { display:flex; gap:16px; padding:16px; }
.panel { background:#f5e6c8; color:#5a3e1b; padding:16px; border-radius:16px; flex:1; overflow:auto; max-height:70vh; }
.practice { text-align:center; }
input { padding:12px; font-size:18px; width:80%; border-radius:12px; border:none; }
button { padding:10px 16px; margin:6px; border-radius:10px; border:none; cursor:pointer; }
.error { color:red; font-weight:bold; }
</style>
</head>

<body>

<h1 style="padding:16px;">Lesson</h1>

<div id="error" class="error"></div>

<div class="container">
  <div class="panel" id="teaching"></div>
  <div class="panel" id="boundaries"></div>
  <div class="panel practice">
    <div id="sentence"></div>
    <br>
    <input id="input" placeholder="Type the word"/>
    <br><br>
    <button onclick="check()">Check</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const cat = params.get("cat");
const lesson = params.get("lesson");

// 🔥 FIXED PATH (NO modules/)
const dataPath = `${cat}/${lesson}/data.js`;

let words = [];
let index = 0;

function showError(msg){
  document.getElementById("error").innerText = msg;
}

// Load lesson file
function loadScript(path){
  return new Promise((resolve, reject)=>{
    const script = document.createElement("script");
    script.src = path;
    script.onload = resolve;
    script.onerror = () => reject(path);
    document.body.appendChild(script);
  });
}

// Sentence safety
function resolveSentence(item){
  if(item.fullSentence && item.fullSentence.length > 10){
    return {
      full: item.fullSentence,
      blank: item.blankSentence || item.fullSentence.replace(item.word,"_____")
    };
  }
  return {
    full: `Spell the word ${item.word}`,
    blank: `_____`
  };
}

// Load lesson
async function init(){
  try{
    await loadScript(dataPath);

    if(!window.LESSON_DATA){
      throw new Error("LESSON_DATA missing");
    }

    words = window.LESSON_DATA.words || [];

    if(words.length === 0){
      throw new Error("No words found");
    }

    renderTeaching();
    next();

  }catch(e){
    showError(`Could not load ${dataPath}`);
    console.error(e);
  }
}

// Teaching panel
function renderTeaching(){
  document.getElementById("teaching").innerHTML =
    `<h3>${window.LESSON_DATA.title}</h3>`;
}

// Next word
function next(){
  const item = words[index];
  const s = resolveSentence(item);

  document.getElementById("sentence").innerText = s.blank;
}

// Check answer
function check(){
  const val = document.getElementById("input").value.trim();
  const correct = words[index].word;

  if(val === correct){
    index++;
    if(index >= words.length) index = 0;
  }

  document.getElementById("input").value = "";
  next();
}

// Start
init();
</script>

</body>
</html>
